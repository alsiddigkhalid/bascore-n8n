app = "bascore-n8n"
primary_region = "iad"

[build]

[env]
  N8N_PORT = "5678"
  N8N_HOST = "0.0.0.0"
  N8N_PROTOCOL = "https"
  WEBHOOK_URL = "https://bascore-n8n.fly.dev/"

[http_service]
  internal_port = 5678
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = "n8n_data"
  destination = "/home/node/.n8n"
