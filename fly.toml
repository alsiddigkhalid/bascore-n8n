# fly.toml app configuration file generated for bascore-n8n on 2026-03-11T00:04:04Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bascore-n8n'
primary_region = 'ams'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
